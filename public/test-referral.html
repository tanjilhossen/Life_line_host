<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLine - Medical Test Referral Slip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2C3E50;
            --secondary: #3498DB;
            --accent: #E74C3C;
            --bg: #F0F3F4;
            --paper: #FFFFFF;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --border: #BDC3C7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text-main); }
        
        .top-bar {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            background: var(--secondary); color: white;
            border: none; padding: 0.6rem 1.2rem;
            border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn:hover { background: #2980B9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--secondary); color: var(--secondary); }
        .btn-outline:hover { background: var(--secondary); color: white; }
        .btn-danger { background: var(--accent); }
        .btn-danger:hover { background: #C0392B; }
        
        .main-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tools Panel */
        .tools-panel {
            background: var(--paper);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            height: calc(100vh - 120px);
            overflow-y: auto;
        }
        
        .tools-panel h3 { margin-bottom: 1.2rem; color: var(--primary); border-bottom: 2px solid #ECF0F1; padding-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; }
        .form-control {
            width: 100%; padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px; font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        .form-control:focus { border-color: var(--secondary); outline: none; }
        
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }
        .suggestion-chip {
            background: #EAECEE;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--primary);
        }
        .suggestion-chip:hover {
            background: var(--secondary);
            color: white;
        }

        /* Preview Container */
        #previewWrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
            padding-bottom: 2rem;
        }

        /* Strict A4 Page styling */
        .referral-page {
            background: var(--paper);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 12px;
            padding: 20mm;
            width: 210mm;
            height: 297mm;
            min-height: 297mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-sizing: border-box;
            page-break-after: always;
        }

        .rx-header {
            display: flex; justify-content: space-between; border-bottom: 3px double var(--primary); padding-bottom: 1.5rem; margin-bottom: 1.5rem;
        }
        .doc-details h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 0.3rem; font-weight: 700; }
        .doc-details p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.4; }
        .clinic-details { text-align: right; }
        .clinic-details h2 { color: var(--secondary); font-size: 1.3rem; margin-bottom: 0.3rem; }
        
        .patient-info {
            display: flex; justify-content: space-between; background: #F8F9FA; padding: 0.8rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.9rem; border: 1px solid #E2E8F0;
        }
        
        .ref-body { flex-grow: 1; overflow: hidden; padding: 1rem 0; }
        .ref-body h3 {
            color: var(--primary); font-size: 1.2rem; margin-bottom: 1rem;
            border-bottom: 2px solid var(--secondary); padding-bottom: 0.4rem;
            display: flex; align-items: center; gap: 0.5rem;
        }

        .test-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .test-item-card {
            background: #F8F9FA;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--secondary);
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rx-footer {
            margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .signature { text-align: right; }
        .signature-line { width: 180px; border-bottom: 1.5px solid var(--primary); margin-bottom: 0.5rem; }
        
        .remove-btn { color: var(--accent); cursor: pointer; border: none; background: none; font-size: 0.9rem; }
        .empty-state { text-align: center; color: var(--text-muted); font-style: italic; padding: 2rem 0; font-size: 0.95rem; }

        .list-edit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F8F9FA;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            border: 1px solid #E2E8F0;
        }

        /* Print Styles */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .top-bar, .tools-panel { display: none !important; }
            .main-container { display: block; padding: 0; max-width: 100%; margin: 0; }
            #previewWrapper { gap: 0; max-height: none; overflow: visible; }
            .referral-page {
                box-shadow: none;
                border-radius: 0;
                padding: 15mm;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
            }
            .remove-btn { display: none !important; }
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:1rem;">
            <i class="fas fa-microscope" style="font-size:1.5rem;"></i>
            <h2 style="font-size:1.2rem; font-weight:600;">LifeLine Medical Test Referral</h2>
        </div>
        <div style="display:flex; gap:1rem;">
            <button class="btn btn-outline" style="color:white; border-color:white;" onclick="window.close()"><i class="fas fa-times"></i> Close</button>
            <button class="btn" onclick="window.print()"><i class="fas fa-print"></i> Print Referral Slip</button>
        </div>
    </div>

    <div class="main-container">
        <!-- Editor Panel -->
        <div class="tools-panel">
            <h3><i class="fas fa-microscope"></i> Advised Tests</h3>
            <div class="form-group">
                <label>Add Medical Test (পরীক্ষা যোগ করুন)</label>
                <div style="display:flex; gap:0.5rem;">
                    <input type="text" id="inTest" class="form-control" placeholder="e.g. CBC, Dengue NS1" onkeypress="handleKeyPress(event)">
                    <button class="btn" onclick="addTest()"><i class="fas fa-plus"></i></button>
                </div>
                <div class="suggestions">
                    <span class="suggestion-chip" onclick="quickAddTest('CBC (রক্ত পরীক্ষা)')">CBC</span>
                    <span class="suggestion-chip" onclick="quickAddTest('Lipid Profile')">Lipid Profile</span>
                    <span class="suggestion-chip" onclick="quickAddTest('Serum Creatinine')">Creatinine</span>
                    <span class="suggestion-chip" onclick="quickAddTest('USG of Whole Abdomen')">USG</span>
                    <span class="suggestion-chip" onclick="quickAddTest('ECG')">ECG</span>
                    <span class="suggestion-chip" onclick="quickAddTest('RBS (Random Blood Sugar)')">RBS</span>
                    <span class="suggestion-chip" onclick="quickAddTest('Serum Bilirubin')">Bilirubin</span>
                    <span class="suggestion-chip" onclick="quickAddTest('Urine R/M/E')">Urine RME</span>
                </div>
            </div>
            
            <div id="editTestsList" style="margin-top: 15px;"></div>
        </div>

        <!-- Preview A4 Container -->
        <div id="previewWrapper">
            <!-- Dynamic referral pages will be loaded here -->
        </div>
    </div>

    <script>
        let testsList = [];
        let docInfo = {};
        let appInfo = {};

        window.onload = () => {
            const appId = localStorage.getItem('prescriptionAppId');
            const appStr = localStorage.getItem('allAppointments');
            const docStr = localStorage.getItem('doctorUser');
            
            if(appId && appStr && docStr) {
                const appointments = JSON.parse(appStr);
                docInfo = JSON.parse(docStr);
                appInfo = appointments.find(a => a.id == appId) || {};
                
                // Let's load the tests if the doctor already entered them in the prescription, otherwise leave empty
                testsList = [];
                
                rebuildReferralPages();
                renderEditList();
            }
        };

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                addTest();
            }
        }

        function quickAddTest(name) {
            if(!testsList.includes(name)) {
                testsList.push(name);
                rebuildReferralPages();
                renderEditList();
            }
        }

        function addTest() {
            const val = document.getElementById('inTest').value.trim();
            if(val) {
                testsList.push(val);
                document.getElementById('inTest').value = '';
                rebuildReferralPages();
                renderEditList();
            }
        }

        function removeTest(index) {
            testsList.splice(index, 1);
            rebuildReferralPages();
            renderEditList();
        }

        function renderEditList() {
            document.getElementById('editTestsList').innerHTML = testsList.map((t, i) => `
                <div class="list-edit-item">
                    <span>${t}</span>
                    <button class="remove-btn" onclick="removeTest(${i})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function rebuildReferralPages() {
            const wrapper = document.getElementById('previewWrapper');
            wrapper.innerHTML = '';

            const itemsPerPage = 8;
            const totalPages = testsList.length <= itemsPerPage ? 1 : Math.ceil(testsList.length / itemsPerPage);

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'referral-page';
                
                // Header
                const headerHtml = `
                    <div class="rx-header">
                        <div class="doc-details">
                            <h1>${docInfo.name || 'Dr. Name'}</h1>
                            <p>${docInfo.specialties || ''}</p>
                            <p>${docInfo.designation || ''}</p>
                            <p><i class="fas fa-phone-alt"></i> ${docInfo.phone || ''}</p>
                        </div>
                        <div class="clinic-details">
                            <h2>${appInfo.clinic_name || 'Clinic Name'}</h2>
                            <p>${appInfo.location || ''}</p>
                            <p style="margin-top:0.5rem; font-weight:600;">Date: <span>${appInfo.appointment_date_formatted || ''}</span></p>
                        </div>
                    </div>
                `;
                
                // Patient Info
                let patientInfoHtml = '';
                if (pageNum === 1) {
                    patientInfoHtml = `
                        <div class="patient-info">
                            <div><strong>Patient Name:</strong> <span>${appInfo.patient_name || ''}</span></div>
                            <div><strong>Age/Sex:</strong> <span>${appInfo.patient_age || ''}Y / ${appInfo.patient_gender === 'Male' ? 'Male' : appInfo.patient_gender === 'Female' ? 'Female' : 'Other'}</span></div>
                            <div><strong>Serial No:</strong> <span># ${appInfo.serial_number || ''}</span></div>
                        </div>
                    `;
                } else {
                    patientInfoHtml = `
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; border-bottom:1px solid #eee; padding-bottom:0.5rem; margin-bottom:1.5rem; color:var(--text-muted);">
                            <span><strong>Patient:</strong> ${appInfo.patient_name || ''}</span>
                            <span><strong>Serial No:</strong> # ${appInfo.serial_number || ''}</span>
                            <span>Page ${pageNum} of ${totalPages}</span>
                        </div>
                    `;
                }

                // Body
                const startIdx = (pageNum - 1) * itemsPerPage;
                const endIdx = startIdx + itemsPerPage;
                const pageTests = testsList.slice(startIdx, endIdx);
                
                let testsHtml = '';
                if (pageTests.length === 0) {
                    testsHtml = '<div class="empty-state">No medical tests advised. Use the panel on the left to add tests.</div>';
                } else {
                    testsHtml = `
                        <div class="test-grid">
                            ${pageTests.map((t, idx) => `
                                <div class="test-item-card">
                                    <span>${startIdx + idx + 1}. ${t}</span>
                                    <button class="remove-btn" onclick="removeTest(${startIdx + idx})"><i class="fas fa-times"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                const bodyHtml = `
                    <div class="ref-body">
                        <h3><i class="fas fa-file-medical-alt"></i> Medical Test Referral Slip</h3>
                        <p style="font-size:0.9rem; color:var(--text-muted); margin-bottom:1rem;">Dear Lab/Technician, please perform the following investigations for the patient mentioned above:</p>
                        ${testsHtml}
                    </div>
                `;

                // Footer
                const footerHtml = `
                    <div class="rx-footer">
                        <div style="font-size:0.8rem; color:var(--text-muted);">
                            Powered by LifeLine | Lab Referral Slip | Page ${pageNum} of ${totalPages}
                        </div>
                        <div class="signature">
                            <div class="signature-line"></div>
                            <p style="font-weight:600; font-size:0.9rem; color:var(--primary);">Doctor's Signature</p>
                        </div>
                    </div>
                `;

                pageDiv.innerHTML = headerHtml + patientInfoHtml + bodyHtml + footerHtml;
                wrapper.appendChild(pageDiv);
            }
        }
    </script>
</body>
</html>
