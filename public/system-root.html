<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Root | Restricted</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center">

    <div class="bg-gray-800 p-8 rounded-lg shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-mono text-red-500 tracking-widest">⚠️ ROOT ACCESS</h1>
            <p class="text-gray-400 text-sm mt-1 font-mono">Unauthorized access is strictly prohibited</p>
        </div>

        <form id="rootLoginForm" class="space-y-6">
            <div>
                <label class="block text-gray-400 font-mono text-sm mb-1">Root Username</label>
                <input type="text" id="rootUser" required class="w-full p-3 bg-gray-900 text-green-400 border border-gray-600 rounded font-mono focus:outline-none focus:border-red-500" placeholder=">_ admin">
            </div>

            <div>
                <label class="block text-gray-400 font-mono text-sm mb-1">Master Key</label>
                <input type="password" id="masterKey" required class="w-full p-3 bg-gray-900 text-green-400 border border-gray-600 rounded font-mono focus:outline-none focus:border-red-500" placeholder=">_ ********">
            </div>

            <button type="submit" class="w-full bg-red-700 text-white font-mono font-bold py-3 rounded hover:bg-red-600 transition shadow-lg">
                INITIALIZE SECURE CONNECTION
            </button>
        </form>
    </div>

    <script src="/js/notify.js"></script>
    <script src="/js/root.js"></script>
</body>
</html>
